<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages

      // This script handles 404 redirects for GitHub Pages
      // When a route like /numerana-calculator/singlebasic is accessed,
      // GitHub Pages serves this 404.html. We redirect to the app with
      // the original path as a query parameter, and React Router handles it.

      var l = window.location;
      
      // Extract the path, removing the /numerana-calculator prefix
      var path = l.pathname;
      if (path.startsWith('/numerana-calculator/')) {
        path = path.substring('/numerana-calculator'.length); // Keep the leading /
      }
      
      // Store the redirect path in sessionStorage for React to use
      sessionStorage.redirect = path + l.search + l.hash;
      
      // Navigate to the main app
      if (l.hostname === 'localhost' || l.hostname === '127.0.0.1') {
        // Local development - redirect to root
        l.replace(
          l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/'
        );
      } else {
        // GitHub Pages production - redirect to /numerana-calculator/
        l.replace(
          l.protocol + '//' + l.hostname + '/numerana-calculator/'
        );
      }
    </script>
  </head>
  <body></body>
</html>
