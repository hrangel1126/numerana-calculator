<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting...</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // MIT License
      // https://github.com/rafgraph/spa-github-pages

      // This script handles 404 redirects for GitHub Pages
      // When a route like /numerana-calculator/singlebasic is accessed,
      // GitHub Pages serves this 404.html. We extract the path and pass it
      // as a query parameter (?p=/singlebasic) to the app.

      var l = window.location;
      
      // Extract the full pathname
      var pathname = l.pathname;
      
      // Remove /numerana-calculator prefix if present
      var basePath = '/numerana-calculator';
      if (pathname.startsWith(basePath + '/')) {
        pathname = pathname.substring(basePath.length);
      } else if (pathname === basePath) {
        pathname = '/';
      }
      
      // Encode the path for use in query parameter
      var pathParam = encodeURIComponent(pathname);
      
      // Build the redirect URL with the path as a query parameter
      var redirectUrl;
      if (l.hostname === 'localhost' || l.hostname === '127.0.0.1') {
        // Local development
        redirectUrl = l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') + '/?p=' + pathParam;
      } else {
        // GitHub Pages production
        redirectUrl = l.protocol + '//' + l.hostname + '/numerana-calculator/?p=' + pathParam;
      }
      
      // Redirect to the app
      l.replace(redirectUrl);
    </script>
  </head>
  <body></body>
</html>
